services:
  flaskapp:
    build:
      context: .
    container_name: flask-app
    env_file:
      - .env
    expose:
      - "5090"
    depends_on:
      - db
    networks:
      - app-net
    restart: always

  db:
    image: postgres:17-alpine
    container_name: postgres-db
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - app-net
    restart: always

  nginx:
    image: nginx:1.13.5
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
       - ./conf.d:/etc/nginx/conf.d
    depends_on:
      - flaskapp
    networks:
      - app-net
    restart: always

networks:
  app-net:
    driver: bridge
volumes:
  postgres-data:
